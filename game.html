<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe</title>
<style>
  body{
    font-family:Arial;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
  }

  h1{margin-bottom:10px;}

  .scoreboard{
    display:flex;
    gap:20px;
    margin-bottom:10px;
  }

  #board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(3,100px);
    gap:8px;
  }

  .cell{
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2.5rem;
    font-weight:bold;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
  }

  .x{color:red;}
  .o{color:dodgerblue;}

  .win{
    background:rgba(255,255,255,0.35) !important;
    transform:scale(1.05);
  }

  .modal{
    position:fixed;
    inset:0;
    display:none;
    background:rgba(0,0,0,0.6);
    align-items:center;
    justify-content:center;
  }

  .modal-content{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    text-align:center;
  }

  .confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
  }

  @keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);opacity:0;}
  }
</style>
</head>
<body>
  <a href="index.html" style="position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 5px;">Back to Home</a>

<h1>Tic Tac Toe</h1>

<div class="scoreboard">
  <div>X: <span id="xScore">0</span></div>
  <div>O: <span id="oScore">0</span></div>
  <div>Draws: <span id="dScore">0</span></div>
</div>

<div id="board"></div>
<div id="status"></div>

<div class="modal" id="endModal">
  <div class="modal-content">
    <div id="modalText"></div>
    <button onclick="restartMatch()">Restart Match</button>
  </div>
</div>

<script>
const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");
const endModal=document.getElementById("endModal");
const modalText=document.getElementById("modalText");

const xScoreEl=document.getElementById("xScore");
const oScoreEl=document.getElementById("oScore");
const dScoreEl=document.getElementById("dScore");

let board=[];
let currentPlayer="X";
let gameOver=false;
let matchOver=false;

let xWins=0,oWins=0,draws=0;

function initBoard(){
  boardEl.innerHTML="";
  for(let i=0;i<9;i++){
    const c=document.createElement("div");
    c.className="cell";
    c.dataset.i=i;
    c.onclick=handleMove;
    boardEl.appendChild(c);
  }
}

function startGame(){
  board=Array(9).fill(null);
  gameOver=false;
  currentPlayer="X";
  initBoard();
  updateStatus();
}

function handleMove(e){
  if(gameOver||matchOver)return;

  const i=e.target.dataset.i;
  if(board[i])return;

  play(i,currentPlayer);

  if(checkWin(currentPlayer)) return endRound(currentPlayer);
  if(!board.includes(null)) return endRound("Draw");

  currentPlayer=currentPlayer==="X"?"O":"X";
  updateStatus();
}

function play(i,p){
  board[i]=p;
  const cell=boardEl.children[i];
  cell.textContent=p;
  cell.classList.add(p.toLowerCase());
}

function getWinLine(p){
  const w=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return w.find(c=>c.every(i=>board[i]===p)) || null;
}

function checkWin(p){
  return getWinLine(p)!==null;
}

function highlight(line){
  if(!line) return;
  line.forEach(i=>{
    boardEl.children[i].classList.add("win");
  });
}

function endRound(res){
  gameOver=true;

  let winLine=null;

  if(res==="X"){
    xWins++;
    winLine=getWinLine("X");
  }
  else if(res==="O"){
    oWins++;
    winLine=getWinLine("O");
  }
  else{
    draws++;
  }

  xScoreEl.textContent=xWins;
  oScoreEl.textContent=oWins;
  dScoreEl.textContent=draws;

  highlight(winLine);

  if(xWins===5||oWins===5){
    matchOver=true;
    triggerConfetti();
    modalText.textContent=(xWins===5?"X":"O")+" wins MATCH!";
    endModal.style.display="flex";
    return;
  }

  setTimeout(()=>{
    board=Array(9).fill(null);
    gameOver=false;
    currentPlayer="X";
    initBoard();
    updateStatus();
  },800);
}

function restartMatch(){
  xWins=0;oWins=0;draws=0;
  matchOver=false;

  xScoreEl.textContent=0;
  oScoreEl.textContent=0;
  dScoreEl.textContent=0;

  endModal.style.display="none";
  startGame();
}

function updateStatus(){
  statusEl.textContent="Turn: "+currentPlayer;
}

function triggerConfetti(){
  for(let i=0;i<80;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background="hsl("+Math.random()*360+",100%,50%)";
    c.style.animationDuration=(Math.random()*2+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

startGame();
</script>

</body>
</html>
